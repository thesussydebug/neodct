# Route default audio through our custom mixer
pcm.!default {
    type plug
    slave.pcm "dmixer"
}

# Define the software mixer
pcm.dmixer {
    type dmix
    ipc_key 1024
    slave {
        pcm "hw:0,0"
        channels 2        # <--- QEMU virtio-sound REQUIRES stereo
        rate 22050        # Match Koki's 22kHz sample rate
        period_size 1024
        buffer_size 4096
    }
}

# Keep mixer controls on the default hardware card
ctl.!default {
    type hw
    card 0
}
